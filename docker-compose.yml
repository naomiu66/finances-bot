services:
  finances-bot:
    build: .
    container_name: finances-bot
    restart: unless-stopped
    ports: 
      - "${PORT}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: finances-bot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: finances-bot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped


volumes:
  postgres_data: